name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK components
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0" "build-tools;34.0.0"

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build release APK
        run: ./gradlew assembleRelease --no-daemon
      - name: Sign APK with consistent key
        run: |
          echo "" | base64 -d > /tmp/release.jks
          $ANDROID_HOME/build-tools/34.0.0/zipalign -v 4 \
            app/build/outputs/apk/release/app-release-unsigned.apk \
            app/build/outputs/apk/release/app-release-aligned.apk
          $ANDROID_HOME/build-tools/34.0.0/apksigner sign \
            --ks /tmp/release.jks \
            --ks-pass pass:mftracker123 \
            --key-pass pass:mftracker123 \
            --ks-key-alias mftracker \
            --out app/build/outputs/apk/release/MFTracker-signed.apk \
            app/build/outputs/apk/release/app-release-aligned.apk
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: MFTracker-Pixel8a
          path: app/build/outputs/apk/release/MFTracker-signed.apk
          retention-days: 30
